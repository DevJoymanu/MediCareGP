kind = "web"
previewPath = "/"
title = "GP Medical Practice"
version = "1.0.0"
id = "artifacts/gp-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19129

[services.development]
run = "pnpm --filter @workspace/gp-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gp-website", "run", "build" ]
publicDir = "artifacts/gp-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19129"
BASE_PATH = "/"
