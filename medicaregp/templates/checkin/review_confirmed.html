<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrival Confirmed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0fdf4; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 40px 32px; width: 100%; max-width: 420px;
      text-align: center;
    }
    .tick {
      width: 72px; height: 72px; background: #16a34a;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 24px;
    }
    .tick i { font-size: 36px; color: #fff; }
    h1 { font-size: 22px; font-weight: 700; color: #14532d; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #4b5563; line-height: 1.6; margin-bottom: 28px; }
    .info-box {
      background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 12px;
      padding: 16px; margin-bottom: 24px; text-align: left;
    }
    .info-box .label { font-size: 11px; font-weight: 700; color: #16a34a; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .info-box .value { font-size: 15px; font-weight: 700; color: #14532d; }
    .note {
      font-size: 13px; color: #6b7280; background: #f9fafb;
      border-radius: 10px; padding: 12px 14px;
    }
    .practice { font-size: 12px; color: #9ca3af; margin-top: 28px; }
  </style>
</head>
<body>
<div class="card">
  <div class="tick">
    <i class="bi bi-check-lg"></i>
  </div>

  <h1>You're checked in!</h1>
  <p class="sub">
    Thank you, <strong>{{ patient.first_name }}</strong>. The reception team
    has been notified that you have arrived for your review.
  </p>

  <div class="info-box">
    <div class="label">Patient</div>
    <div class="value">{{ patient }}</div>
  </div>

  <div class="note">
    <i class="bi bi-info-circle" style="margin-right:6px;"></i>
    Please take a seat. A staff member will call you shortly.
  </div>

  <div class="practice">{{ practice_name }}</div>
</div>
</body>
</html>
