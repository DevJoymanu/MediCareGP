<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consultation link expired</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0b1220; color: #e5e7eb; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 14px; padding: 28px; max-width: 420px; text-align: center; }
    .icon { font-size: 40px; margin-bottom: 12px; }
    .card h1 { font-size: 18px; margin-bottom: 10px; }
    .card p { font-size: 14px; color: #9ca3af; line-height: 1.55; }
    .contact { margin-top: 14px; color: #e5e7eb; font-size: 13.5px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">&#8987;</div>
      <h1>This consultation link has expired</h1>
      <p>Video consultation links are valid until 2&nbsp;hours after the scheduled appointment time. Please contact the practice to arrange a new consultation.</p>
      {% if practice_phone %}<p class="contact">{{ practice_name }} &middot; {{ practice_phone }}</p>{% endif %}
    </div>
  </div>
</body>
</html>
