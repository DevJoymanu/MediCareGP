<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ document.get_doc_type_display }} - {{ document.patient }}</title>
    <style>
        body { font-family: Georgia, serif; max-width: 700px; margin: 40px auto; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; margin: 0; }
        .header p { color: #666; margin: 5px 0 0; }
        .meta { margin-bottom: 20px; }
        .meta p { margin: 3px 0; }
        .content { white-space: pre-wrap; line-height: 1.8; margin: 20px 0; }
        .signature { margin-top: 60px; border-top: 1px solid #333; width: 200px; padding-top: 5px; }
        .no-print { text-align: center; margin-bottom: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="window.print()" style="padding:8px 24px;font-size:1rem;cursor:pointer">🖨️ Print</button>
        <button onclick="window.close()" style="padding:8px 24px;font-size:1rem;cursor:pointer;margin-left:8px">Close</button>
    </div>
    <div class="header">
        <h1>MediCare GP Practice</h1>
        <p>123 Medical Drive, Healthcare City | Tel: (012) 345-6789</p>
    </div>
    <h2 style="text-align:center">{{ document.get_doc_type_display }}</h2>
    <div class="meta">
        <p><strong>Patient:</strong> {{ document.patient.full_name }}</p>
        <p><strong>ID Number:</strong> {{ document.patient.id_number }}</p>
        <p><strong>Date:</strong> {{ document.date_issued|date:"d M Y" }}</p>
    </div>
    <div class="content">{{ document.content }}</div>
    <div class="signature">{{ document.issued_by }}</div>
</body>
</html>
