<div class="card" style="display:flex;gap:14px;align-items:center;">
  <div style="width:46px;height:46px;border-radius:12px;background:
    {% if d.doc_type == 'Sick Note' %}#fef3c7{% elif d.doc_type == 'Referral Letter' %}#eff6ff{% elif d.doc_type == 'Prescription' %}#f0fdf4{% elif d.doc_type == 'Vaccination Record' %}#f5f3ff{% elif d.doc_type == 'Consultation Note' %}#eff6ff{% elif d.doc_type == 'Lab Result' or d.doc_type == 'Lab Request Form' %}#f0fdf4{% elif d.doc_type == 'Consent Form' or d.doc_type == 'POPIA Consent' %}#fdf4ff{% elif d.doc_type == 'Billing Statement' or d.doc_type == 'Claim Form' %}#fff7ed{% else %}#f8fafc{% endif %};
    display:flex;align-items:center;justify-content:center;font-size:20px;color:
    {% if d.doc_type == 'Sick Note' %}#d97706{% elif d.doc_type == 'Referral Letter' %}#2563eb{% elif d.doc_type == 'Prescription' %}#15803d{% elif d.doc_type == 'Vaccination Record' %}#7c3aed{% elif d.doc_type == 'Consultation Note' %}#1d4ed8{% elif d.doc_type == 'Lab Result' or d.doc_type == 'Lab Request Form' %}#16a34a{% elif d.doc_type == 'Consent Form' or d.doc_type == 'POPIA Consent' %}#9333ea{% elif d.doc_type == 'Billing Statement' or d.doc_type == 'Claim Form' %}#ea580c{% else %}#6b7280{% endif %};
    flex-shrink:0;">
    <i class="bi bi-{% if d.doc_type == 'Sick Note' %}file-medical{% elif d.doc_type == 'Referral Letter' %}envelope-paper{% elif d.doc_type == 'Prescription' %}capsule-pill{% elif d.doc_type == 'Vaccination Record' %}shield-check{% elif d.doc_type == 'Consultation Note' %}clipboard2-pulse{% elif d.doc_type == 'Lab Result' or d.doc_type == 'Lab Request Form' %}droplet{% elif d.doc_type == 'Consent Form' or d.doc_type == 'POPIA Consent' %}pen-fill{% elif d.doc_type == 'Billing Statement' or d.doc_type == 'Claim Form' %}receipt{% else %}file-earmark-text{% endif %}"></i>
  </div>
  <div style="flex:1;">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:4px;">
      <span style="font-weight:700;font-size:15px;">{{ d.doc_type }}</span>
      <span style="font-size:11px;color:var(--text-3);padding:2px 9px;border-radius:6px;background:#f1f5f9;font-weight:500;">{{ d.category }}</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;font-size:13px;color:var(--text-3);">
      <div class="avatar av-36 av-1" style="width:18px;height:18px;font-size:7px;">
        {{ d.patient.first_name|first|upper }}{{ d.patient.last_name|first|upper }}
      </div>
      <span>{{ d.patient }}</span>
      <span style="color:#d1d5db;">&middot;</span>
      <span>Issued {{ d.date_issued|date:"j M Y" }}</span>
      <span style="color:#d1d5db;">&middot;</span>
      <span>{{ d.issued_by }}</span>
    </div>
    {% if d.notes %}<div style="margin-top:5px;font-size:12px;color:var(--text-4);font-style:italic;">{{ d.notes }}</div>{% endif %}
  </div>
  <div style="display:flex;gap:8px;">
    <a href="{% url 'document_detail' d.pk %}" class="btn-ghost" style="padding:7px 13px;font-size:12px;"><i class="bi bi-eye"></i> View</a>
    <a href="{% url 'document_print' d.pk %}" class="btn-ghost" style="padding:7px 11px;font-size:12px;"><i class="bi bi-printer"></i></a>
  </div>
</div>
