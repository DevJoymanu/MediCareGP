{% extends "base.html" %}
{% block title %}{{ title }} - MediCare GP{% endblock %}
{% block header %}<h4 class="mb-0">{{ title }}</h4>{% endblock %}
{% block content %}
<div class="card stat-card">
    <div class="card-body">
        <form method="post">{% csrf_token %}
            <div class="row">
                {% for field in form %}
                <div class="{% if field.name == 'content' %}col-12{% else %}col-md-6{% endif %} mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'scripts:list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
