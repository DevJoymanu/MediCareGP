{% extends "base.html" %}
{% block title %}Delete Patient - MediCare GP{% endblock %}
{% block header %}<h4 class="mb-0">Delete Patient</h4>{% endblock %}
{% block content %}
<div class="card stat-card">
    <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ patient.full_name }}</strong>? This action cannot be undone.</p>
        <form method="post">{% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'patients:detail' patient.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
